# Secondary FreeBSD CI (supplements the primary bare-metal test in ci.yml).
# Cirrus CI provides free FreeBSD VMs but Capsicum enforcement is identical
# to bare-metal since FreeBSD 14 includes it in the GENERIC kernel.
freebsd_task:
  name: test-freebsd
  freebsd_instance:
    image_family: freebsd-14-3

  install_script:
    - pkg install -y gmake

  build_script:
    - echo "=== FreeBSD $(uname -sr) ==="
    - gmake CC=cc CFLAGS="-Os -std=c23 -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG" LDFLAGS="-s" clean simplecipher

  test_build_script:
    - gmake CC=cc CFLAGS="-Os -std=c23 -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG -pthread" LDFLAGS="-s" tests/test_p2p

  unit_test_script:
    - ./tests/test_p2p

  smoke_test_script:
    # Verify the binary runs without crashing.
    # Tests POSIX compatibility, socket I/O, Capsicum sandbox (cap_enter
    # + per-fd rights), and CIPHER_HARDEN code paths.
    - ./simplecipher listen 19799 &
    - sleep 1
    - kill $! 2>/dev/null || true
