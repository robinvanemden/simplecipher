name: Platform

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-compile:
    uses: ./.github/workflows/reusable-build.yml

  test-linux:
    needs: cross-compile
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-x86_64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        run: |
          chmod +x simplecipher tests/test_linux.sh
          bash tests/test_linux.sh ./simplecipher 2>&1 | tee /tmp/test_linux.log
          echo "### Linux Binary Tests" >> $GITHUB_STEP_SUMMARY
          grep 'Results:' /tmp/test_linux.log >> $GITHUB_STEP_SUMMARY || true

  test-linux-aarch64:
    needs: cross-compile
    strategy:
      matrix:
        os: [ubuntu-24.04-arm, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Linux aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-aarch64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        run: |
          chmod +x simplecipher tests/test_linux.sh
          bash tests/test_linux.sh ./simplecipher

  test-windows:
    needs: cross-compile
    strategy:
      matrix:
        os: [windows-2025, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-x86_64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        shell: pwsh
        run: |
          tests/test_windows.ps1 -Binary simplecipher.exe

  test-windows-aarch64:
    needs: cross-compile
    runs-on: windows-11-arm

    steps:
      - name: Download Windows aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-aarch64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        shell: pwsh
        run: |
          tests/test_windows.ps1 -Binary simplecipher.exe

  test-macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build and test (arm64, native)
        run: |
          echo "=== macOS $(uname -sr) $(uname -m) ==="
          make clean
          make -j$(sysctl -n hw.ncpu) CC=cc \
            simplecipher tests/test_p2p tests/test_socks5_proxy
          echo '=== P2P tests ==='
          ./tests/test_p2p 2>&1 | tee /tmp/test_p2p.log
          echo '=== SOCKS5 proxy tests ==='
          ./tests/test_socks5_proxy 2>&1 | tee /tmp/test_socks5.log
          echo '=== Binary tests ==='
          bash tests/test_macos.sh ./simplecipher 2>&1 | tee /tmp/test_macos.log
          echo "### macOS arm64 Tests" >> $GITHUB_STEP_SUMMARY
          grep 'Total:\|Results:' /tmp/test_p2p.log /tmp/test_socks5.log /tmp/test_macos.log >> $GITHUB_STEP_SUMMARY || true
          echo '=== Smoke test ==='
          . tests/test_helpers.sh
          PORT=$(random_port)
          ./simplecipher listen $PORT &
          PID=$!
          wait_for_port $PORT 5
          kill $PID 2>/dev/null || true
          echo 'Smoke test passed'

      - name: Build and verify (x86_64, cross-compile)
        run: |
          make clean
          make -j$(sysctl -n hw.ncpu) CC=cc \
            CFLAGS='-Os -std=c2x -Isrc -Ilib -flto -ffunction-sections -fdata-sections -target x86_64-apple-macos12' \
            LDFLAGS='-flto -Wl,-dead_strip -Wl,-x -target x86_64-apple-macos12' \
            simplecipher
          echo '=== Verify x86_64 binary ==='
          file simplecipher | grep -q x86_64
          echo 'x86_64 cross-compile verified'

  test-freebsd:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Run tests on FreeBSD (Vultr bare-metal via SSH)
        env:
          SSH_KEY: ${{ secrets.FREEBSD_SSH_KEY }}
          HOST: ${{ secrets.FREEBSD_HOST }}
          HOST_KEY: ${{ secrets.FREEBSD_HOST_KEY }}
        run: |
          # Skip if secrets are not configured (forks, PRs from forks)
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ] || [ -z "$HOST_KEY" ]; then
            echo "::warning::SKIP: FreeBSD bare-metal test not run — FREEBSD_SSH_KEY, FREEBSD_HOST, or FREEBSD_HOST_KEY not configured"
            exit 0
          fi

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/freebsd_key
          chmod 600 ~/.ssh/freebsd_key
          echo "$HOST_KEY" >> ~/.ssh/known_hosts

          SSH="ssh -i ~/.ssh/freebsd_key ci@$HOST"
          trap 'rm -f ~/.ssh/freebsd_key' EXIT

          # Clone/update, build, test
          $SSH "
            set -e

            # Clean stale test artifacts from cancelled runs
            rm -f /tmp/test_identity* /tmp/test_id_*

            # Remove git lock files left by cancelled runs
            rm -f simplecipher/.git/index.lock
            rm -f simplecipher/.git/refs/remotes/origin/*.lock
            rm -f simplecipher/.git/shallow.lock

            # Fetch with fallback to full re-clone
            if [ -d simplecipher ]; then
              cd simplecipher
              if ! git fetch --force origin 2>/dev/null; then
                cd .. && rm -rf simplecipher
                git clone https://github.com/${{ github.repository }}.git simplecipher
                cd simplecipher
              else
                git reset --hard origin/master
              fi
            else
              git clone https://github.com/${{ github.repository }}.git simplecipher
              cd simplecipher
            fi
            git checkout ${{ github.sha }}
            git clean -fdx
            git checkout -- .
            echo '=== FreeBSD' \$(uname -sr) '==='
            rm -f src/*.o lib/*.o simplecipher tests/test_p2p tests/test_socks5_proxy
            gmake -j\$(sysctl -n hw.ncpu) CC=cc simplecipher tests/test_p2p tests/test_socks5_proxy
            ulimit -l unlimited 2>/dev/null || true
            ./tests/test_p2p
            echo '=== SOCKS5 proxy test ==='
            ./tests/test_socks5_proxy
            echo '=== Smoke test ==='
            PORT=\$(jot -r 1 20000 60000)
            ./simplecipher listen \$PORT &
            PID=\$!
            for i in \$(seq 1 50); do sockstat -l -p \$PORT 2>/dev/null | grep -q LISTEN && break; sleep 0.1; done
            kill \$PID 2>/dev/null || true
            echo 'Smoke test passed'
          "

          # SSH key cleaned up by trap

  test-openbsd:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Run tests on OpenBSD 7.7 (Vultr bare-metal via SSH)
        env:
          SSH_KEY: ${{ secrets.OPENBSD_SSH_KEY }}
          HOST: ${{ secrets.OPENBSD_HOST }}
          HOST_KEY: ${{ secrets.OPENBSD_HOST_KEY }}
        run: |
          # Skip if secrets are not configured (forks, PRs from forks)
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ] || [ -z "$HOST_KEY" ]; then
            echo "::warning::SKIP: OpenBSD bare-metal test not run — OPENBSD_SSH_KEY, OPENBSD_HOST, or OPENBSD_HOST_KEY not configured"
            exit 0
          fi

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/openbsd_key
          chmod 600 ~/.ssh/openbsd_key
          echo "$HOST_KEY" >> ~/.ssh/known_hosts

          SSH="ssh -i ~/.ssh/openbsd_key ci@$HOST"
          trap 'rm -f ~/.ssh/openbsd_key' EXIT

          # Clone/update, build, test
          # OpenBSD 7.7 ships Clang 16 which needs -std=c2x (not c23).
          # The constexpr compat shim in platform.h handles this.
          $SSH "
            set -e

            # Clean stale test artifacts from cancelled runs
            rm -f /tmp/test_identity* /tmp/test_id_*

            # Remove git lock files left by cancelled runs
            rm -f simplecipher/.git/index.lock
            rm -f simplecipher/.git/refs/remotes/origin/*.lock
            rm -f simplecipher/.git/shallow.lock

            # Fetch with fallback to full re-clone
            if [ -d simplecipher ]; then
              cd simplecipher
              if ! git fetch --force origin 2>/dev/null; then
                cd .. && rm -rf simplecipher
                git clone https://github.com/${{ github.repository }}.git simplecipher
                cd simplecipher
              else
                git reset --hard origin/master
              fi
            else
              git clone https://github.com/${{ github.repository }}.git simplecipher
              cd simplecipher
            fi
            git checkout ${{ github.sha }}
            git clean -fdx
            git checkout -- .
            echo '=== OpenBSD' \$(uname -sr) '==='
            rm -f src/*.o lib/*.o simplecipher tests/test_p2p tests/test_socks5_proxy
            gmake -j\$(sysctl -n hw.ncpu) CC=cc simplecipher tests/test_p2p tests/test_socks5_proxy
            ulimit -l unlimited 2>/dev/null || true
            ./tests/test_p2p
            echo '=== SOCKS5 proxy test ==='
            ./tests/test_socks5_proxy
            echo '=== Smoke test ==='
            PORT=\$(jot -r 1 20000 60000)
            ./simplecipher listen \$PORT &
            PID=\$!
            for i in \$(seq 1 50); do netstat -an 2>/dev/null | grep -q \"\\.\$PORT .*LISTEN\" && break; sleep 0.1; done
            kill \$PID 2>/dev/null || true
            echo 'Smoke test passed'
          "

          # SSH key cleaned up by trap

  test-arm64:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Run tests on Linux ARM64 (bare-metal via SSH)
        env:
          SSH_KEY: ${{ secrets.ARM64_SSH_KEY }}
          HOST: ${{ secrets.ARM64_HOST }}
          HOST_KEY: ${{ secrets.ARM64_HOST_KEY }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ] || [ -z "$HOST_KEY" ]; then
            echo "::warning::SKIP: ARM64 bare-metal test not run — ARM64_SSH_KEY, ARM64_HOST, or ARM64_HOST_KEY not configured"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/arm64_key
          chmod 600 ~/.ssh/arm64_key
          echo "$HOST_KEY" >> ~/.ssh/known_hosts
          SSH="ssh -i ~/.ssh/arm64_key ci@$HOST"
          trap 'rm -f ~/.ssh/arm64_key' EXIT
          $SSH "
            set -e

            # Clean stale test artifacts from cancelled runs
            rm -f /tmp/test_identity* /tmp/test_id_*

            # Remove git lock files left by cancelled runs
            rm -f simplecipher/.git/index.lock
            rm -f simplecipher/.git/refs/remotes/origin/*.lock
            rm -f simplecipher/.git/shallow.lock

            # Fetch with fallback to full re-clone
            if [ -d simplecipher ]; then
              cd simplecipher
              if ! git fetch --force origin 2>/dev/null; then
                cd .. && rm -rf simplecipher
                git clone https://github.com/${{ github.repository }}.git simplecipher
                cd simplecipher
              else
                git reset --hard origin/master
              fi
            else
              git clone https://github.com/${{ github.repository }}.git simplecipher
              cd simplecipher
            fi
            git checkout ${{ github.sha }}
            git clean -fdx
            git checkout -- .
            echo '=== Linux ARM64' \$(uname -srm) '==='
            rm -f src/*.o lib/*.o simplecipher tests/test_p2p tests/test_socks5_proxy
            make -j\$(nproc) CC=gcc simplecipher tests/test_p2p tests/test_socks5_proxy
            ulimit -l unlimited 2>/dev/null || true
            ./tests/test_p2p
            echo '=== SOCKS5 proxy test ==='
            ./tests/test_socks5_proxy
            echo '=== Extended ARM64 tests (valgrind + Tor) ==='
            bash tests/test_arm64_tor.sh
          "
          # SSH key cleaned up by trap
