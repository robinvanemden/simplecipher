name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-p2p:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build and run P2P integration tests
        run: |
          mkdir -p build/native
          cd build/native
          cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O0" ../..
          make -j$(nproc) test_p2p
          ./test_p2p

      - name: Build and run with CIPHER_HARDEN
        run: |
          gcc -std=c2x -DCIPHER_HARDEN -pthread -Isrc -Ilib -O2 \
            -o build/native/test_p2p_harden \
            tests/test_p2p.c src/platform.c src/crypto.c src/protocol.c \
            src/ratchet.c src/network.c src/tui.c src/tui_posix.c \
            src/cli.c src/cli_posix.c lib/monocypher.c
          build/native/test_p2p_harden

  test-tui:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install tmux
        run: sudo apt-get install -y --no-install-recommends tmux

      - name: Build native binary
        run: |
          mkdir -p build/native
          cd build/native
          cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O0" ../..
          make -j$(nproc) simplecipher

      - name: Run TUI integration test
        run: bash tests/test_tui.sh build/native/simplecipher

  fuzz:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install clang-19 (C23 constexpr + sanitizer runtimes)
        run: sudo apt-get install -y --no-install-recommends clang-19 libclang-rt-19-dev

      - name: Build fuzz targets (clang + libFuzzer + ASan + UBSan)
        run: |
          mkdir -p build/fuzz
          cd build/fuzz
          CC=clang-19 cmake -DFUZZ=ON ../..
          make -j$(nproc) fuzz_frame_open fuzz_sanitize fuzz_validate_port fuzz_socks5

      - name: Smoke-fuzz frame_open (30s)
        run: build/fuzz/fuzz_frame_open tests/corpus/frame_open -max_total_time=30 -print_final_stats=1

      - name: Smoke-fuzz sanitize_peer_text (30s)
        run: build/fuzz/fuzz_sanitize tests/corpus/sanitize -max_total_time=30 -print_final_stats=1

      - name: Smoke-fuzz validate_port (30s)
        run: build/fuzz/fuzz_validate_port tests/corpus/validate_port -max_total_time=30 -print_final_stats=1

      - name: Smoke-fuzz socks5_build_request (30s)
        run: build/fuzz/fuzz_socks5 -max_total_time=30 -print_final_stats=1

  test-asan-ubsan:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install clang-19
        run: sudo apt-get install -y --no-install-recommends clang-19 libclang-rt-19-dev

      - name: Build test_p2p with ASan + UBSan
        run: |
          mkdir -p build/sanitize
          cd build/sanitize
          CC=clang-19 cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g -O1" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            ../..
          make -j$(nproc) test_p2p

      - name: Run tests under ASan + UBSan
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: build/sanitize/test_p2p

      - name: Build test_p2p with MSan
        run: |
          mkdir -p build/msan
          cd build/msan
          CC=clang-19 cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=memory -fsanitize-memory-track-origins -fno-omit-frame-pointer -g -O1" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=memory" \
            ../..
          make -j$(nproc) test_p2p

      - name: Run tests under MSan
        env:
          MSAN_OPTIONS: halt_on_error=1
        run: build/msan/test_p2p

  static-analysis:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install clang-tidy-19
        run: sudo apt-get install -y --no-install-recommends clang-19 clang-tidy-19

      - name: Generate compilation database
        run: |
          cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                -DCMAKE_C_COMPILER=clang-19 \
                -B build/analysis

      - name: Run clang-tidy
        run: |
          clang-tidy-19 -p build/analysis \
            src/main.c src/platform.c src/crypto.c src/protocol.c \
            src/network.c src/tui.c src/tui_posix.c src/cli.c src/cli_posix.c

  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache toolchains
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            /opt/x-tools
            /opt/llvm-mingw
          key: toolchains-v3-musl-x86_64-aarch64-llvm-20260311

      - name: Setup musl cross-compilers (with checksum verification)
        run: |
          # Hardcoded SHA256 digests — update when upgrading toolchains.
          declare -A EXPECTED_SHA=(
            [x86_64-unknown-linux-musl]="47a4db19648a82d2597c7df75f886530a55056df01e8775dd4440c3cfdce9f36"
            [aarch64-unknown-linux-musl]="bcb60ab89918911001f7a7501f4f6caec6fdface129f44c99b692f97d7b54235"
          )
          sudo mkdir -p /opt/x-tools
          for TRIPLE in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            if [ ! -d /opt/x-tools/$TRIPLE ]; then
              ARCHIVE="/tmp/$TRIPLE.tar.xz"
              curl -fsSL -o "$ARCHIVE" \
                "https://github.com/robinvanemden/toolchains/releases/download/v1/$TRIPLE.tar.xz"
              ACTUAL=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)
              if [ "$ACTUAL" != "${EXPECTED_SHA[$TRIPLE]}" ]; then
                echo "::error::Checksum mismatch for $TRIPLE (got $ACTUAL)"
                exit 1
              fi
              sudo tar -xJf "$ARCHIVE" -C /opt/x-tools/
              rm -f "$ARCHIVE"
            fi
            echo "/opt/x-tools/$TRIPLE/$TRIPLE/bin" >> "$GITHUB_PATH"
          done

      - name: Setup llvm-mingw (with checksum verification)
        run: |
          EXPECTED="7c091479d08b13d72aa75acce0ba85cadbc7e066f340afea42849eaf5a5a6cad"
          if [ ! -d /opt/llvm-mingw ]; then
            ARCHIVE="/tmp/llvm-mingw.tar.xz"
            curl -fsSL -o "$ARCHIVE" \
              "https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-ubuntu-22.04-x86_64.tar.xz"
            ACTUAL=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::Checksum mismatch for llvm-mingw (got $ACTUAL)"
              exit 1
            fi
            sudo tar -xJf "$ARCHIVE" -C /opt/
            sudo mv /opt/llvm-mingw-20260311-ucrt-ubuntu-22.04-x86_64 /opt/llvm-mingw
            rm -f "$ARCHIVE"
          fi

      - name: Patch llvm-mingw toolchain path for CI
        run: |
          sed -i 's|/opt/llvm-mingw-[^ )]*|/opt/llvm-mingw|' cmake/toolchains/win-x86_64.cmake cmake/toolchains/win-aarch64.cmake

      - name: Build tests (CMake configure, C23 requirement)
        run: bash tests/test_build.sh

      - name: Build Linux x86_64 target
        run: |
          cmake --preset linux-x86_64
          cmake --build --preset linux-x86_64

      - name: Build Linux aarch64 target
        run: |
          cmake --preset linux-aarch64
          cmake --build --preset linux-aarch64

      - name: Build Windows x86_64 target
        run: |
          cmake --preset win-x86_64
          cmake --build --preset win-x86_64

      - name: Build Windows aarch64 target
        run: |
          cmake --preset win-aarch64
          cmake --build --preset win-aarch64

      - name: Upload Linux x86_64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-linux-x86_64
          path: build/linux_x86_64/simplecipher

      - name: Upload Linux aarch64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-linux-aarch64
          path: build/linux_aarch64/simplecipher

      - name: Upload Windows x86_64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-win-x86_64
          path: build/win_x86_64/simplecipher.exe

      - name: Upload Windows aarch64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-win-aarch64
          path: build/win_aarch64/simplecipher.exe

      - name: Upload test scripts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-assets
          path: tests/

  build-android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Install NDK r28
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.0.13004108"

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          [ -f ~/.android/debug.keystore ] || keytool -genkeypair \
            -keystore ~/.android/debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Validate APK
        run: bash tests/test_android.sh android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-android
          path: android/app/build/outputs/apk/debug/app-debug.apk

  test-android-emulator:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4ci.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Install NDK r28
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.0.13004108"

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          [ -f ~/.android/debug.keystore ] || keytool -genkeypair \
            -keystore ~/.android/debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt

      - name: Build APK with x86_64 for emulator
        working-directory: android
        run: ./gradlew assembleDebug -PextraAbi=x86_64

      - name: Emulator smoke test
        uses: reactivecircus/android-emulator-runner@70f4dee990796918b78d040e3278474bdbd348a7 # v2
        with:
          api-level: 28
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash tests/test_android_emulator.sh android/app/build/outputs/apk/debug/app-debug.apk

  test-linux:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-x86_64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        run: |
          chmod +x simplecipher tests/test_linux.sh
          bash tests/test_linux.sh ./simplecipher

  test-linux-aarch64:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-24.04-arm, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Linux aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-aarch64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        run: |
          chmod +x simplecipher tests/test_linux.sh
          bash tests/test_linux.sh ./simplecipher

  test-windows:
    needs: build
    strategy:
      matrix:
        os: [windows-2025, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-x86_64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        shell: pwsh
        run: |
          tests/test_windows.ps1 -Binary simplecipher.exe

  test-windows-aarch64:
    needs: build
    runs-on: windows-11-arm

    steps:
      - name: Download Windows aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-aarch64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        shell: pwsh
        run: |
          tests/test_windows.ps1 -Binary simplecipher.exe
