name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-p2p:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build and run P2P integration tests
        run: |
          mkdir -p build/native
          cd build/native
          cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O0" ../..
          make -j$(nproc) test_p2p
          ./test_p2p

      - name: Build and run with CIPHER_HARDEN
        run: |
          gcc -std=c2x -DCIPHER_HARDEN -pthread -Isrc -Ilib -O2 \
            -o build/native/test_p2p_harden \
            tests/test_p2p.c src/platform.c src/crypto.c src/protocol.c \
            src/ratchet.c src/network.c src/tui.c src/tui_posix.c \
            src/cli.c src/cli_posix.c lib/monocypher.c
          build/native/test_p2p_harden

      - name: Build and run SOCKS5 proxy loopback test
        run: |
          gcc -std=c2x -DCIPHER_HARDEN -DNDEBUG -pthread -Isrc -Ilib -O2 \
            -o build/native/test_socks5_proxy \
            tests/test_socks5_proxy.c src/platform.c src/crypto.c src/protocol.c \
            src/ratchet.c src/network.c src/tui.c src/tui_posix.c \
            src/cli.c src/cli_posix.c lib/monocypher.c
          build/native/test_socks5_proxy

  test-tui:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install tmux
        run: sudo apt-get install -y --no-install-recommends tmux

      - name: Build native binary
        run: |
          mkdir -p build/native
          cd build/native
          cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O0" ../..
          make -j$(nproc) simplecipher

      - name: Run TUI integration test
        run: bash tests/test_tui.sh build/native/simplecipher

      - name: Verify README demo matches actual output
        run: |
          # Regenerate the demo from a real session and check it still
          # parses correctly (SAS code captured, README updated without error).
          # We don't commit the change — the SAS is random each run — but we
          # verify the script works and the README has a valid demo block.
          cp README.md /tmp/readme_before.md
          PATH="$(pwd)/build/native:$PATH" bash docs/generate-demo.sh
          # Verify the demo block exists and has a SAS code
          grep -qP 'Step 1.*listen|Safety code:.*[0-9A-F]{4}' README.md || {
            echo "::error::Demo block has no SAS code after regeneration"
            exit 1
          }
          echo "Demo regeneration verified"

  fuzz:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install clang-19 (C23 constexpr + sanitizer runtimes)
        run: sudo apt-get install -y --no-install-recommends clang-19 libclang-rt-19-dev

      - name: Build fuzz targets (clang + libFuzzer + ASan + UBSan)
        run: |
          mkdir -p build/fuzz
          cd build/fuzz
          CC=clang-19 cmake -DFUZZ=ON ../..
          make -j$(nproc) fuzz_frame_open fuzz_sanitize fuzz_validate_port fuzz_socks5

      - name: Smoke-fuzz frame_open (30s)
        run: build/fuzz/fuzz_frame_open tests/corpus/frame_open -max_total_time=30 -print_final_stats=1

      - name: Smoke-fuzz sanitize_peer_text (30s)
        run: build/fuzz/fuzz_sanitize tests/corpus/sanitize -max_total_time=30 -print_final_stats=1

      - name: Smoke-fuzz validate_port (30s)
        run: build/fuzz/fuzz_validate_port tests/corpus/validate_port -max_total_time=30 -print_final_stats=1

      - name: Smoke-fuzz socks5_build_request (30s)
        run: build/fuzz/fuzz_socks5 -max_total_time=30 -print_final_stats=1

  test-asan-ubsan:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install clang-19
        run: sudo apt-get install -y --no-install-recommends clang-19 libclang-rt-19-dev

      - name: Build test_p2p with ASan + UBSan
        run: |
          mkdir -p build/sanitize
          cd build/sanitize
          CC=clang-19 cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g -O1" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            ../..
          make -j$(nproc) test_p2p

      - name: Run tests under ASan + UBSan
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: build/sanitize/test_p2p

      - name: Build test_p2p with MSan
        run: |
          mkdir -p build/msan
          cd build/msan
          CC=clang-19 cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=memory -fsanitize-memory-track-origins -fno-omit-frame-pointer -g -O1" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=memory" \
            ../..
          make -j$(nproc) test_p2p

      - name: Run tests under MSan
        env:
          MSAN_OPTIONS: halt_on_error=1
        run: build/msan/test_p2p

  static-analysis:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install clang-tidy-19 and clang-format-19
        run: sudo apt-get install -y --no-install-recommends clang-19 clang-tidy-19 clang-format-19

      - name: Generate compilation database
        run: |
          cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                -DCMAKE_C_COMPILER=clang-19 \
                -B build/analysis

      - name: Run clang-tidy
        run: |
          clang-tidy-19 -p build/analysis \
            src/main.c src/platform.c src/crypto.c src/protocol.c \
            src/network.c src/tui.c src/tui_posix.c src/cli.c src/cli_posix.c

      - name: Check C code formatting (clang-format)
        run: clang-format-19 --dry-run -Werror src/*.c src/*.h

      - name: Check Java code formatting (google-java-format)
        run: |
          GJF_VERSION=1.25.2
          GJF_SHA256=25157797a0a972c2290b5bc71530c4f7ad646458025e3484412a6e5a9b8c9aa6
          GJF_JAR="google-java-format-${GJF_VERSION}-all-deps.jar"
          curl -sL "https://github.com/google/google-java-format/releases/download/v${GJF_VERSION}/${GJF_JAR}" -o /tmp/gjf.jar
          echo "${GJF_SHA256}  /tmp/gjf.jar" | sha256sum -c -
          find android -name '*.java' -not -path '*/build/*' | sort | \
            xargs java -jar /tmp/gjf.jar --dry-run --set-exit-if-changed

  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Cache toolchains
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            /opt/x-tools
            /opt/llvm-mingw
          key: toolchains-v3-musl-x86_64-aarch64-llvm-20260311

      - name: Setup musl cross-compilers (with checksum verification)
        run: |
          # Hardcoded SHA256 digests — update when upgrading toolchains.
          declare -A EXPECTED_SHA=(
            [x86_64-unknown-linux-musl]="47a4db19648a82d2597c7df75f886530a55056df01e8775dd4440c3cfdce9f36"
            [aarch64-unknown-linux-musl]="bcb60ab89918911001f7a7501f4f6caec6fdface129f44c99b692f97d7b54235"
          )
          sudo mkdir -p /opt/x-tools
          for TRIPLE in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            if [ ! -d /opt/x-tools/$TRIPLE ]; then
              ARCHIVE="/tmp/$TRIPLE.tar.xz"
              curl -fsSL -o "$ARCHIVE" \
                "https://github.com/robinvanemden/toolchains/releases/download/v1/$TRIPLE.tar.xz"
              ACTUAL=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)
              if [ "$ACTUAL" != "${EXPECTED_SHA[$TRIPLE]}" ]; then
                echo "::error::Checksum mismatch for $TRIPLE (got $ACTUAL)"
                exit 1
              fi
              sudo tar -xJf "$ARCHIVE" -C /opt/x-tools/
              rm -f "$ARCHIVE"
            fi
            # Re-verify after cache restore: detect poisoned cache by checking
            # that the GCC binary exists and is a real ELF executable.
            GCC="/opt/x-tools/$TRIPLE/bin/$TRIPLE-gcc"
            if [ ! -x "$GCC" ] || ! file "$GCC" | grep -q "ELF"; then
              echo "::error::Toolchain $TRIPLE appears corrupted (missing or non-ELF gcc)"
              exit 1
            fi
            echo "/opt/x-tools/$TRIPLE/$TRIPLE/bin" >> "$GITHUB_PATH"
          done

      - name: Setup llvm-mingw (with checksum verification)
        run: |
          EXPECTED="7c091479d08b13d72aa75acce0ba85cadbc7e066f340afea42849eaf5a5a6cad"
          if [ ! -d /opt/llvm-mingw ]; then
            ARCHIVE="/tmp/llvm-mingw.tar.xz"
            curl -fsSL -o "$ARCHIVE" \
              "https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-ubuntu-22.04-x86_64.tar.xz"
            ACTUAL=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::Checksum mismatch for llvm-mingw (got $ACTUAL)"
              exit 1
            fi
            sudo tar -xJf "$ARCHIVE" -C /opt/
            sudo mv /opt/llvm-mingw-20260311-ucrt-ubuntu-22.04-x86_64 /opt/llvm-mingw
            rm -f "$ARCHIVE"
          fi
          # Re-verify after cache restore: detect poisoned cache.
          if [ ! -d /opt/llvm-mingw/bin ] || ! ls /opt/llvm-mingw/bin/*-clang >/dev/null 2>&1; then
            echo "::error::llvm-mingw appears corrupted (missing bin/ or clang binaries)"
            exit 1
          fi

      - name: Patch llvm-mingw toolchain path for CI
        run: |
          sed -i 's|/opt/llvm-mingw-[^ )]*|/opt/llvm-mingw|' cmake/toolchains/win-x86_64.cmake cmake/toolchains/win-aarch64.cmake

      - name: Build tests (CMake configure, C23 requirement)
        run: bash tests/test_build.sh

      - name: Build Linux x86_64 target
        run: |
          cmake --preset linux-x86_64
          cmake --build --preset linux-x86_64

      - name: Build Linux aarch64 target
        run: |
          cmake --preset linux-aarch64
          cmake --build --preset linux-aarch64

      - name: Build Windows x86_64 target
        run: |
          cmake --preset win-x86_64
          cmake --build --preset win-x86_64

      - name: Build Windows aarch64 target
        run: |
          cmake --preset win-aarch64
          cmake --build --preset win-aarch64

      - name: Upload Linux x86_64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-linux-x86_64
          path: build/linux_x86_64/simplecipher

      - name: Upload Linux aarch64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-linux-aarch64
          path: build/linux_aarch64/simplecipher

      - name: Upload Windows x86_64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-win-x86_64
          path: build/win_x86_64/simplecipher.exe

      - name: Upload Windows aarch64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-win-aarch64
          path: build/win_aarch64/simplecipher.exe

      - name: Upload test scripts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-assets
          path: tests/

  build-android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Install NDK r28
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.0.13004108"

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          [ -f ~/.android/debug.keystore ] || keytool -genkeypair \
            -keystore ~/.android/debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt

      - name: Build Android APKs
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Validate minimal APK
        run: bash tests/test_android.sh android/app/build/outputs/apk/minimal/debug/app-minimal-debug.apk minimal

      - name: Validate full APK
        run: bash tests/test_android.sh android/app/build/outputs/apk/full/debug/app-full-debug.apk full

      - name: Upload Android APKs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-android
          path: |
            android/app/build/outputs/apk/minimal/debug/app-minimal-debug.apk
            android/app/build/outputs/apk/full/debug/app-full-debug.apk

  test-android-emulator:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4ci.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Install NDK r28
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.0.13004108"

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          [ -f ~/.android/debug.keystore ] || keytool -genkeypair \
            -keystore ~/.android/debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt

      - name: Build APKs with x86_64 for emulator
        working-directory: android
        run: ./gradlew assembleDebug -PextraAbi=x86_64

      - name: Cross-compile SOCKS5 proxy test for emulator (x86_64)
        run: |
          NDK=$ANDROID_HOME/ndk/28.0.13004108
          CC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android28-clang"
          $CC -std=c23 -Os -Isrc -Ilib -DNDEBUG -DCIPHER_HARDEN -static \
            -o tests/test_socks5_proxy_android \
            tests/test_socks5_proxy.c src/platform.c src/crypto.c src/protocol.c \
            src/ratchet.c src/network.c src/tui.c src/tui_posix.c \
            src/cli.c src/cli_posix.c lib/monocypher.c -lm
          file tests/test_socks5_proxy_android

      - name: Cross-compile SOCKS5 daemon + simplecipher peer for emulator
        run: |
          NDK=$ANDROID_HOME/ndk/28.0.13004108
          CC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android28-clang"
          $CC -Os -static -o tests/mini_socks5_daemon_android \
            tests/mini_socks5_daemon.c
          $CC -std=c23 -Os -Isrc -Ilib -DNDEBUG -DCIPHER_HARDEN -static \
            -o tests/simplecipher_android \
            src/main.c src/platform.c src/crypto.c src/protocol.c \
            src/ratchet.c src/network.c src/tui.c src/tui_posix.c \
            src/cli.c src/cli_posix.c lib/monocypher.c -lm

      - name: Emulator smoke test (full flavor)
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 28
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash tests/test_android_emulator.sh android/app/build/outputs/apk/full/debug/app-full-debug.apk

  test-linux:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-x86_64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        run: |
          chmod +x simplecipher tests/test_linux.sh
          bash tests/test_linux.sh ./simplecipher

  test-linux-aarch64:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-24.04-arm, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Linux aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-aarch64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        run: |
          chmod +x simplecipher tests/test_linux.sh
          bash tests/test_linux.sh ./simplecipher

  test-windows:
    needs: build
    strategy:
      matrix:
        os: [windows-2025, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-x86_64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        shell: pwsh
        run: |
          tests/test_windows.ps1 -Binary simplecipher.exe

  test-windows-aarch64:
    needs: build
    runs-on: windows-11-arm

    steps:
      - name: Download Windows aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-aarch64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        shell: pwsh
        run: |
          tests/test_windows.ps1 -Binary simplecipher.exe

  test-freebsd:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Run tests on FreeBSD (Vultr bare-metal via SSH)
        env:
          SSH_KEY: ${{ secrets.FREEBSD_SSH_KEY }}
          HOST: ${{ secrets.FREEBSD_HOST }}
          HOST_KEY: ${{ secrets.FREEBSD_HOST_KEY }}
        run: |
          # Skip if secrets are not configured (forks, PRs from forks)
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ] || [ -z "$HOST_KEY" ]; then
            echo "::warning::SKIP: FreeBSD bare-metal test not run — FREEBSD_SSH_KEY, FREEBSD_HOST, or FREEBSD_HOST_KEY not configured"
            exit 0
          fi

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/freebsd_key
          chmod 600 ~/.ssh/freebsd_key
          echo "$HOST_KEY" >> ~/.ssh/known_hosts

          SSH="ssh -i ~/.ssh/freebsd_key ci@$HOST"

          # Clone/update, build, test
          $SSH "
            set -e
            if [ -d simplecipher ]; then
              cd simplecipher && git fetch origin && git reset --hard origin/master
            else
              git clone https://github.com/${{ github.repository }}.git simplecipher
              cd simplecipher
            fi
            git checkout ${{ github.sha }}
            echo '=== FreeBSD' \$(uname -sr) '==='
            gmake CC=cc CFLAGS='-Os -std=c23 -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG' LDFLAGS='-s' clean simplecipher
            gmake CC=cc CFLAGS='-Os -std=c23 -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG -pthread' LDFLAGS='-s' tests/test_p2p tests/test_socks5_proxy
            ulimit -l unlimited 2>/dev/null || true
            ./tests/test_p2p
            echo '=== SOCKS5 proxy test ==='
            ./tests/test_socks5_proxy
            echo '=== Smoke test ==='
            ./simplecipher listen 19799 &
            PID=\$!
            sleep 1
            kill \$PID 2>/dev/null || true
            echo 'Smoke test passed'
          "

          # Clean up SSH key
          rm -f ~/.ssh/freebsd_key

  test-openbsd:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Run tests on OpenBSD 7.7 (Vultr bare-metal via SSH)
        env:
          SSH_KEY: ${{ secrets.OPENBSD_SSH_KEY }}
          HOST: ${{ secrets.OPENBSD_HOST }}
          HOST_KEY: ${{ secrets.OPENBSD_HOST_KEY }}
        run: |
          # Skip if secrets are not configured (forks, PRs from forks)
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ] || [ -z "$HOST_KEY" ]; then
            echo "::warning::SKIP: OpenBSD bare-metal test not run — OPENBSD_SSH_KEY, OPENBSD_HOST, or OPENBSD_HOST_KEY not configured"
            exit 0
          fi

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/openbsd_key
          chmod 600 ~/.ssh/openbsd_key
          echo "$HOST_KEY" >> ~/.ssh/known_hosts

          SSH="ssh -i ~/.ssh/openbsd_key ci@$HOST"

          # Clone/update, build, test
          # OpenBSD 7.7 ships Clang 16 which needs -std=c2x (not c23).
          # The constexpr compat shim in platform.h handles this.
          $SSH "
            set -e
            if [ -d simplecipher ]; then
              cd simplecipher && git fetch origin && git reset --hard origin/master
            else
              git clone https://github.com/${{ github.repository }}.git simplecipher
              cd simplecipher
            fi
            git checkout ${{ github.sha }}
            echo '=== OpenBSD' \$(uname -sr) '==='
            gmake CC=cc CFLAGS='-Os -std=c2x -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG' LDFLAGS='-s' clean simplecipher
            gmake CC=cc CFLAGS='-Os -std=c2x -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG -pthread' LDFLAGS='-s' tests/test_p2p tests/test_socks5_proxy
            ulimit -l unlimited 2>/dev/null || true
            ./tests/test_p2p
            echo '=== SOCKS5 proxy test ==='
            ./tests/test_socks5_proxy
            echo '=== Smoke test ==='
            ./simplecipher listen 19799 &
            PID=\$!
            sleep 1
            kill \$PID 2>/dev/null || true
            echo 'Smoke test passed'
          "

          # Clean up SSH key
          rm -f ~/.ssh/openbsd_key

  test-arm64:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Run tests on Linux ARM64 (bare-metal via SSH)
        env:
          SSH_KEY: ${{ secrets.ARM64_SSH_KEY }}
          HOST: ${{ secrets.ARM64_HOST }}
          HOST_KEY: ${{ secrets.ARM64_HOST_KEY }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ] || [ -z "$HOST_KEY" ]; then
            echo "::warning::SKIP: ARM64 bare-metal test not run — ARM64_SSH_KEY, ARM64_HOST, or ARM64_HOST_KEY not configured"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/arm64_key
          chmod 600 ~/.ssh/arm64_key
          echo "$HOST_KEY" >> ~/.ssh/known_hosts
          SSH="ssh -i ~/.ssh/arm64_key ci@$HOST"
          $SSH "
            set -e
            if [ -d simplecipher ]; then
              cd simplecipher && git fetch origin && git reset --hard origin/master
            else
              git clone https://github.com/${{ github.repository }}.git simplecipher
              cd simplecipher
            fi
            git checkout ${{ github.sha }}
            echo '=== Linux ARM64' \$(uname -srm) '==='
            make CC=gcc CFLAGS='-Os -std=c2x -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG' LDFLAGS='-s' clean simplecipher
            make CC=gcc CFLAGS='-Os -std=c2x -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG -pthread' LDFLAGS='-s' tests/test_p2p tests/test_socks5_proxy
            ulimit -l unlimited 2>/dev/null || true
            ./tests/test_p2p
            echo '=== SOCKS5 proxy test ==='
            ./tests/test_socks5_proxy
            echo '=== Extended ARM64 tests (valgrind + Tor) ==='
            bash tests/test_arm64_tor.sh
          "
          rm -f ~/.ssh/arm64_key

  # BSD testing uses bare-metal Vultr servers via SSH (test-freebsd, test-openbsd above).
