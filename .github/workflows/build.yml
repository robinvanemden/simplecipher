name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-compile:
    uses: ./.github/workflows/reusable-build.yml

  build-android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Install NDK r28
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.0.13004108"

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          [ -f ~/.android/debug.keystore ] || keytool -genkeypair \
            -keystore ~/.android/debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt

      - name: Build Android APKs
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Validate minimal APK
        run: bash tests/test_android.sh android/app/build/outputs/apk/minimal/debug/app-minimal-debug.apk minimal

      - name: Validate full APK
        run: bash tests/test_android.sh android/app/build/outputs/apk/full/debug/app-full-debug.apk full

      - name: Upload Android APKs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-android
          path: |
            android/app/build/outputs/apk/minimal/debug/app-minimal-debug.apk
            android/app/build/outputs/apk/full/debug/app-full-debug.apk

  build-macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build arm64 (native)
        run: |
          make -j$(sysctl -n hw.ncpu) CC=cc simplecipher

      - name: Upload macOS aarch64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-macos-aarch64
          path: simplecipher

      - name: Build x86_64 (cross-compile)
        run: |
          make clean
          make -j$(sysctl -n hw.ncpu) CC=cc \
            CFLAGS='-Os -std=c2x -Isrc -Ilib -flto -ffunction-sections -fdata-sections -target x86_64-apple-macos12' \
            LDFLAGS='-flto -Wl,-dead_strip -Wl,-x -target x86_64-apple-macos12' \
            simplecipher
          echo '=== Verify x86_64 binary ==='
          file simplecipher | grep -q x86_64
          echo 'x86_64 cross-compile verified'

      - name: Upload macOS x86_64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-macos-x86_64
          path: simplecipher
