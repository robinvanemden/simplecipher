name: Release

on:
  push:
    tags: ['v*']

jobs:
  test-p2p:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build and run P2P integration tests
        run: |
          mkdir -p build/native
          cd build/native
          cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O0" ../..
          make -j$(nproc) test_p2p
          ./test_p2p

  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache toolchains
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            /opt/x-tools
            /opt/llvm-mingw
          key: toolchains-v3-musl-x86_64-aarch64-llvm-20260311

      - name: Setup musl cross-compilers (with checksum verification)
        run: |
          declare -A EXPECTED_SHA=(
            [x86_64-unknown-linux-musl]="47a4db19648a82d2597c7df75f886530a55056df01e8775dd4440c3cfdce9f36"
            [aarch64-unknown-linux-musl]="bcb60ab89918911001f7a7501f4f6caec6fdface129f44c99b692f97d7b54235"
          )
          sudo mkdir -p /opt/x-tools
          for TRIPLE in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            if [ ! -d /opt/x-tools/$TRIPLE ]; then
              ARCHIVE="/tmp/$TRIPLE.tar.xz"
              curl -fsSL -o "$ARCHIVE" \
                "https://github.com/robinvanemden/toolchains/releases/download/v1/$TRIPLE.tar.xz"
              ACTUAL=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)
              if [ "$ACTUAL" != "${EXPECTED_SHA[$TRIPLE]}" ]; then
                echo "::error::Checksum mismatch for $TRIPLE (got $ACTUAL)"
                exit 1
              fi
              sudo tar -xJf "$ARCHIVE" -C /opt/x-tools/
              rm -f "$ARCHIVE"
            fi
            echo "/opt/x-tools/$TRIPLE/$TRIPLE/bin" >> "$GITHUB_PATH"
          done

      - name: Setup llvm-mingw (with checksum verification)
        run: |
          EXPECTED="7c091479d08b13d72aa75acce0ba85cadbc7e066f340afea42849eaf5a5a6cad"
          if [ ! -d /opt/llvm-mingw ]; then
            ARCHIVE="/tmp/llvm-mingw.tar.xz"
            curl -fsSL -o "$ARCHIVE" \
              "https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-ubuntu-22.04-x86_64.tar.xz"
            ACTUAL=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::Checksum mismatch for llvm-mingw (got $ACTUAL)"
              exit 1
            fi
            sudo tar -xJf "$ARCHIVE" -C /opt/
            sudo mv /opt/llvm-mingw-20260311-ucrt-ubuntu-22.04-x86_64 /opt/llvm-mingw
            rm -f "$ARCHIVE"
          fi

      - name: Patch llvm-mingw toolchain path for CI
        run: |
          sed -i 's|/opt/llvm-mingw-[^ )]*|/opt/llvm-mingw|' cmake/toolchains/win-x86_64.cmake cmake/toolchains/win-aarch64.cmake

      - name: Build Linux x86_64 target
        run: |
          cmake --preset linux-x86_64
          cmake --build --preset linux-x86_64

      - name: Build Linux aarch64 target
        run: |
          cmake --preset linux-aarch64
          cmake --build --preset linux-aarch64

      - name: Build Windows x86_64 target
        run: |
          cmake --preset win-x86_64
          cmake --build --preset win-x86_64

      - name: Build Windows aarch64 target
        run: |
          cmake --preset win-aarch64
          cmake --build --preset win-aarch64

      - name: Upload Linux x86_64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-linux-x86_64
          path: build/linux_x86_64/simplecipher

      - name: Upload Linux aarch64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-linux-aarch64
          path: build/linux_aarch64/simplecipher

      - name: Upload Windows x86_64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-win-x86_64
          path: build/win_x86_64/simplecipher.exe

      - name: Upload Windows aarch64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-win-aarch64
          path: build/win_aarch64/simplecipher.exe

      - name: Upload test scripts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-assets
          path: tests/

  build-android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Install NDK r28
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.0.13004108"

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          [ -f ~/.android/debug.keystore ] || keytool -genkeypair \
            -keystore ~/.android/debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt

      - name: Build Android APKs (release + debug)
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease
          ./gradlew assembleDebug

      - name: Find APK
        id: apk
        run: |
          APK=$(ls android/app/build/outputs/apk/release/app-release*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then echo "::error::No release APK found"; exit 1; fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Verify APK is signed (fail-closed for releases)
        run: |
          # Tagged releases MUST produce a signed APK.  An unsigned APK means
          # signing secrets are missing — fail the release rather than publish
          # an unverifiable artifact.
          if ! java -jar "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | tail -1)/lib/apksigner.jar" verify \
               --print-certs "${{ steps.apk.outputs.path }}" 2>/dev/null; then
            echo "::error::APK is not signed — release signing secrets may be missing"
            exit 1
          fi
          echo "APK signature verified"

      - name: Validate APK
        run: bash tests/test_android.sh ${{ steps.apk.outputs.path }}

      - name: Upload Android APK (release)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-android
          path: ${{ steps.apk.outputs.path }}

      - name: Upload Android APK (debug)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  test-linux:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-x86_64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        run: |
          chmod +x simplecipher tests/test_linux.sh
          bash tests/test_linux.sh ./simplecipher

  test-linux-aarch64:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-24.04-arm, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Linux aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-aarch64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        run: |
          chmod +x simplecipher tests/test_linux.sh
          bash tests/test_linux.sh ./simplecipher

  test-windows:
    needs: build
    strategy:
      matrix:
        os: [windows-2025, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-x86_64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        shell: pwsh
        run: |
          tests/test_windows.ps1 -Binary simplecipher.exe

  test-windows-aarch64:
    needs: build
    runs-on: windows-11-arm

    steps:
      - name: Download Windows aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-aarch64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        shell: pwsh
        run: |
          tests/test_windows.ps1 -Binary simplecipher.exe

  release:
    needs: [test-p2p, test-linux, test-linux-aarch64, test-windows, test-windows-aarch64, build-android]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write        # Sigstore OIDC token for attestation
      attestations: write    # Store attestations on the repo

    steps:
      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-x86_64
          path: linux-x86_64

      - name: Download Linux aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-aarch64
          path: linux-aarch64

      - name: Download Windows x86_64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-x86_64
          path: win-x86_64

      - name: Download Windows aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-aarch64
          path: win-aarch64

      - name: Download Android APK (release)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-android
          path: android

      - name: Download Android APK (debug)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-android-debug
          path: android-debug

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp linux-x86_64/simplecipher release/simplecipher-linux-x86_64
          cp linux-aarch64/simplecipher release/simplecipher-linux-aarch64
          cp win-x86_64/simplecipher.exe release/simplecipher-win-x86_64.exe
          cp win-aarch64/simplecipher.exe release/simplecipher-win-aarch64.exe
          cp android/app-release*.apk release/simplecipher-android.apk
          cp android-debug/app-debug.apk release/simplecipher-android-debug.apk
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Attest build provenance (Sigstore)
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            release/simplecipher-linux-x86_64
            release/simplecipher-linux-aarch64
            release/simplecipher-win-x86_64.exe
            release/simplecipher-win-aarch64.exe
            release/simplecipher-android.apk

      - name: Delete existing release (if re-tagging)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --cleanup-tag=false \
            --yes 2>/dev/null || true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release/simplecipher-linux-x86_64 \
            release/simplecipher-linux-aarch64 \
            release/simplecipher-win-x86_64.exe \
            release/simplecipher-win-aarch64.exe \
            release/simplecipher-android.apk \
            release/simplecipher-android-debug.apk \
            release/SHA256SUMS.txt \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
