name: Release

on:
  push:
    tags: ['v*']

jobs:
  test-p2p:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build and run P2P integration tests
        run: |
          mkdir -p build/native
          cd build/native
          cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O0" ../..
          make -j$(nproc) test_p2p
          ./test_p2p

  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Cache toolchains
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            /opt/x-tools
            /opt/llvm-mingw
          key: toolchains-v3-musl-x86_64-aarch64-llvm-20260311

      - name: Setup musl cross-compilers (with checksum verification)
        run: |
          declare -A EXPECTED_SHA=(
            [x86_64-unknown-linux-musl]="47a4db19648a82d2597c7df75f886530a55056df01e8775dd4440c3cfdce9f36"
            [aarch64-unknown-linux-musl]="bcb60ab89918911001f7a7501f4f6caec6fdface129f44c99b692f97d7b54235"
          )
          sudo mkdir -p /opt/x-tools
          for TRIPLE in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            if [ ! -d /opt/x-tools/$TRIPLE ]; then
              ARCHIVE="/tmp/$TRIPLE.tar.xz"
              curl -fsSL -o "$ARCHIVE" \
                "https://github.com/robinvanemden/toolchains/releases/download/v1/$TRIPLE.tar.xz"
              ACTUAL=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)
              if [ "$ACTUAL" != "${EXPECTED_SHA[$TRIPLE]}" ]; then
                echo "::error::Checksum mismatch for $TRIPLE (got $ACTUAL)"
                exit 1
              fi
              sudo tar -xJf "$ARCHIVE" -C /opt/x-tools/
              rm -f "$ARCHIVE"
            fi
            echo "/opt/x-tools/$TRIPLE/$TRIPLE/bin" >> "$GITHUB_PATH"
          done

      - name: Setup llvm-mingw (with checksum verification)
        run: |
          EXPECTED="7c091479d08b13d72aa75acce0ba85cadbc7e066f340afea42849eaf5a5a6cad"
          if [ ! -d /opt/llvm-mingw ]; then
            ARCHIVE="/tmp/llvm-mingw.tar.xz"
            curl -fsSL -o "$ARCHIVE" \
              "https://github.com/mstorsjo/llvm-mingw/releases/download/20260311/llvm-mingw-20260311-ucrt-ubuntu-22.04-x86_64.tar.xz"
            ACTUAL=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::Checksum mismatch for llvm-mingw (got $ACTUAL)"
              exit 1
            fi
            sudo tar -xJf "$ARCHIVE" -C /opt/
            sudo mv /opt/llvm-mingw-20260311-ucrt-ubuntu-22.04-x86_64 /opt/llvm-mingw
            rm -f "$ARCHIVE"
          fi

      - name: Patch llvm-mingw toolchain path for CI
        run: |
          sed -i 's|/opt/llvm-mingw-[^ )]*|/opt/llvm-mingw|' cmake/toolchains/win-x86_64.cmake cmake/toolchains/win-aarch64.cmake

      - name: Build Linux x86_64 target
        run: |
          cmake --preset linux-x86_64
          cmake --build --preset linux-x86_64

      - name: Build Linux aarch64 target
        run: |
          cmake --preset linux-aarch64
          cmake --build --preset linux-aarch64

      - name: Build Windows x86_64 target
        run: |
          cmake --preset win-x86_64
          cmake --build --preset win-x86_64

      - name: Build Windows aarch64 target
        run: |
          cmake --preset win-aarch64
          cmake --build --preset win-aarch64

      - name: Upload Linux x86_64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-linux-x86_64
          path: build/linux_x86_64/simplecipher

      - name: Upload Linux aarch64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-linux-aarch64
          path: build/linux_aarch64/simplecipher

      - name: Upload Windows x86_64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-win-x86_64
          path: build/win_x86_64/simplecipher.exe

      - name: Upload Windows aarch64 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-win-aarch64
          path: build/win_aarch64/simplecipher.exe

      - name: Upload test scripts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-assets
          path: tests/

  build-android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Install NDK r28
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.0.13004108"

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          [ -f ~/.android/debug.keystore ] || keytool -genkeypair \
            -keystore ~/.android/debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt

      - name: Build Android APK
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Find APKs
        id: apk
        run: |
          MINIMAL=$(ls android/app/build/outputs/apk/minimal/release/app-minimal-release*.apk 2>/dev/null | head -1)
          FULL=$(ls android/app/build/outputs/apk/full/release/app-full-release*.apk 2>/dev/null | head -1)
          if [ -z "$MINIMAL" ] || [ -z "$FULL" ]; then echo "::error::Release APKs not found"; exit 1; fi
          echo "minimal=$MINIMAL" >> "$GITHUB_OUTPUT"
          echo "full=$FULL" >> "$GITHUB_OUTPUT"

      - name: Verify APKs are signed (fail-closed for releases)
        run: |
          # Tagged releases MUST produce signed APKs.  An unsigned APK means
          # signing secrets are missing — fail the release rather than publish
          # an unverifiable artifact.
          APKSIGNER="java -jar $ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | tail -1)/lib/apksigner.jar"
          for APK in "${{ steps.apk.outputs.minimal }}" "${{ steps.apk.outputs.full }}"; do
            if ! $APKSIGNER verify --print-certs "$APK" 2>/dev/null; then
              echo "::error::APK is not signed ($APK) — release signing secrets may be missing"
              exit 1
            fi
            echo "APK signature verified: $APK"
          done

      - name: Validate minimal APK
        run: bash tests/test_android.sh ${{ steps.apk.outputs.minimal }} minimal

      - name: Validate full APK
        run: bash tests/test_android.sh ${{ steps.apk.outputs.full }} full

      - name: Stage Android APKs for upload
        run: |
          mkdir -p android-release
          cp "${{ steps.apk.outputs.minimal }}" android-release/simplecipher-minimal.apk
          cp "${{ steps.apk.outputs.full }}" android-release/simplecipher-full.apk

      - name: Upload Android APKs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simplecipher-android
          path: android-release/

  test-linux:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-x86_64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        run: |
          chmod +x simplecipher tests/test_linux.sh
          bash tests/test_linux.sh ./simplecipher

  test-linux-aarch64:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-24.04-arm, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Linux aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-aarch64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        run: |
          chmod +x simplecipher tests/test_linux.sh
          bash tests/test_linux.sh ./simplecipher

  test-windows:
    needs: build
    strategy:
      matrix:
        os: [windows-2025, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-x86_64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        shell: pwsh
        run: |
          tests/test_windows.ps1 -Binary simplecipher.exe

  test-windows-aarch64:
    needs: build
    runs-on: windows-11-arm

    steps:
      - name: Download Windows aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-aarch64

      - name: Download test assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-assets
          path: tests

      - name: Run tests
        shell: pwsh
        run: |
          tests/test_windows.ps1 -Binary simplecipher.exe

  # ---- Security gates (must pass before release) ----

  test-asan-ubsan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install clang-19 with sanitizer runtimes
        run: sudo apt-get install -y --no-install-recommends clang-19 libclang-rt-19-dev
      - name: Build and run under ASan + UBSan
        run: |
          mkdir -p build
          clang-19 -std=c2x -DCIPHER_HARDEN -pthread -Isrc -Ilib \
            -fsanitize=address,undefined -fno-omit-frame-pointer -O1 -g \
            -o build/test_asan \
            tests/test_p2p.c src/platform.c src/crypto.c src/protocol.c \
            src/ratchet.c src/network.c src/tui.c src/tui_posix.c \
            src/cli.c src/cli_posix.c lib/monocypher.c
          ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=halt_on_error=1 \
            build/test_asan

  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install clang-19, clang-tidy-19, and clang-format-19
        run: sudo apt-get install -y --no-install-recommends clang-19 clang-tidy-19 clang-format-19
      - name: Run clang-tidy and clang-format
        run: |
          cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_C_COMPILER=clang-19 -B build/analysis
          clang-tidy-19 -p build/analysis \
            src/main.c src/platform.c src/crypto.c src/protocol.c \
            src/network.c src/tui.c src/tui_posix.c src/cli.c src/cli_posix.c
          clang-format-19 --dry-run -Werror src/*.c src/*.h

  fuzz:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install clang-19 with sanitizer and fuzzer runtimes
        run: sudo apt-get install -y --no-install-recommends clang-19 libclang-rt-19-dev
      - name: Fuzz smoke test (30s per target)
        run: |
          mkdir -p build
          for target in fuzz_frame_open fuzz_sanitize fuzz_validate_port fuzz_socks5 fuzz_fingerprint; do
            clang-19 -std=c2x -Isrc -Ilib -O1 -g \
              -fsanitize=fuzzer,address,undefined \
              -o build/$target \
              tests/$target.c src/platform.c src/crypto.c src/protocol.c \
              src/ratchet.c src/network.c src/tui.c src/tui_posix.c \
              src/cli.c src/cli_posix.c lib/monocypher.c
            timeout 30 build/$target -max_total_time=25; rc=$?
            # timeout returns 124 on normal time expiry — that's expected.
            # Any other non-zero exit means the fuzzer found a crash.
            if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
              echo "FUZZ CRASH in $target (exit code $rc)"
              exit 1
            fi
          done

  test-freebsd:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Run tests on FreeBSD (bare-metal via SSH)
        env:
          SSH_KEY: ${{ secrets.FREEBSD_SSH_KEY }}
          HOST: ${{ secrets.FREEBSD_HOST }}
          HOST_KEY: ${{ secrets.FREEBSD_HOST_KEY }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ] || [ -z "$HOST_KEY" ]; then
            echo "FAIL: release requires bare-metal verification — configure SSH_KEY, HOST, and HOST_KEY secrets"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/freebsd_key
          chmod 600 ~/.ssh/freebsd_key
          echo "$HOST_KEY" >> ~/.ssh/known_hosts
          SSH="ssh -i ~/.ssh/freebsd_key ci@$HOST"
          $SSH "
            set -e
            if [ -d simplecipher ]; then
              cd simplecipher && git fetch origin && git reset --hard origin/master
            else
              git clone https://github.com/${{ github.repository }}.git simplecipher
              cd simplecipher
            fi
            git checkout ${{ github.sha }}
            echo '=== FreeBSD' \$(uname -sr) '==='
            gmake CC=cc CFLAGS='-Os -std=c23 -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG' LDFLAGS='-s' clean simplecipher
            gmake CC=cc CFLAGS='-Os -std=c23 -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG -pthread' LDFLAGS='-s' tests/test_p2p tests/test_socks5_proxy
            ulimit -l unlimited 2>/dev/null || true
            ./tests/test_p2p
            ./tests/test_socks5_proxy
          "
          rm -f ~/.ssh/freebsd_key

  test-openbsd:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Run tests on OpenBSD 7.7 (bare-metal via SSH)
        env:
          SSH_KEY: ${{ secrets.OPENBSD_SSH_KEY }}
          HOST: ${{ secrets.OPENBSD_HOST }}
          HOST_KEY: ${{ secrets.OPENBSD_HOST_KEY }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ] || [ -z "$HOST_KEY" ]; then
            echo "FAIL: release requires bare-metal verification — configure SSH_KEY, HOST, and HOST_KEY secrets"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/openbsd_key
          chmod 600 ~/.ssh/openbsd_key
          echo "$HOST_KEY" >> ~/.ssh/known_hosts
          SSH="ssh -i ~/.ssh/openbsd_key ci@$HOST"
          $SSH "
            set -e
            if [ -d simplecipher ]; then
              cd simplecipher && git fetch origin && git reset --hard origin/master
            else
              git clone https://github.com/${{ github.repository }}.git simplecipher
              cd simplecipher
            fi
            git checkout ${{ github.sha }}
            echo '=== OpenBSD' \$(uname -sr) '==='
            gmake CC=cc CFLAGS='-Os -std=c2x -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG' LDFLAGS='-s' clean simplecipher
            gmake CC=cc CFLAGS='-Os -std=c2x -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG -pthread' LDFLAGS='-s' tests/test_p2p tests/test_socks5_proxy
            ulimit -l unlimited 2>/dev/null || true
            ./tests/test_p2p
            ./tests/test_socks5_proxy
          "
          rm -f ~/.ssh/openbsd_key

  test-arm64:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Run tests on Linux ARM64 (bare-metal via SSH)
        env:
          SSH_KEY: ${{ secrets.ARM64_SSH_KEY }}
          HOST: ${{ secrets.ARM64_HOST }}
          HOST_KEY: ${{ secrets.ARM64_HOST_KEY }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ] || [ -z "$HOST_KEY" ]; then
            echo "FAIL: release requires bare-metal verification — configure SSH_KEY, HOST, and HOST_KEY secrets"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/arm64_key
          chmod 600 ~/.ssh/arm64_key
          echo "$HOST_KEY" >> ~/.ssh/known_hosts
          SSH="ssh -i ~/.ssh/arm64_key ci@$HOST"
          $SSH "
            set -e
            if [ -d simplecipher ]; then
              cd simplecipher && git fetch origin && git reset --hard origin/master
            else
              git clone https://github.com/${{ github.repository }}.git simplecipher
              cd simplecipher
            fi
            git checkout ${{ github.sha }}
            echo '=== Linux ARM64' \$(uname -srm) '==='
            make CC=gcc CFLAGS='-Os -std=c2x -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG' LDFLAGS='-s' clean simplecipher
            make CC=gcc CFLAGS='-Os -std=c2x -Isrc -Ilib -DCIPHER_HARDEN -DNDEBUG -pthread' LDFLAGS='-s' tests/test_p2p tests/test_socks5_proxy
            ulimit -l unlimited 2>/dev/null || true
            ./tests/test_p2p
            ./tests/test_socks5_proxy
            echo '=== Valgrind memory check (SOCKS5) ==='
            valgrind --leak-check=full --error-exitcode=42 ./tests/test_socks5_proxy
            echo '=== Valgrind memory check (core) ==='
            timeout 300 valgrind --error-exitcode=42 ./tests/test_p2p
            echo '=== Real Tor SOCKS5 test ==='
            bash tests/test_arm64_tor.sh
          "
          rm -f ~/.ssh/arm64_key

  test-android-emulator:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4ci.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Install NDK r28
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;28.0.13004108"
      - name: Ensure debug keystore
        run: |
          mkdir -p ~/.android
          [ -f ~/.android/debug.keystore ] || keytool -genkeypair \
            -keystore ~/.android/debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt
      - name: Cross-compile SOCKS5 test binaries for emulator (x86_64)
        run: |
          NDK=$ANDROID_HOME/ndk/28.0.13004108
          CC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android28-clang"
          $CC -std=c23 -Os -Isrc -Ilib -DNDEBUG -DCIPHER_HARDEN -static \
            -o tests/test_socks5_proxy_android \
            tests/test_socks5_proxy.c src/platform.c src/crypto.c src/protocol.c \
            src/ratchet.c src/network.c src/tui.c src/tui_posix.c \
            src/cli.c src/cli_posix.c lib/monocypher.c -lm
          $CC -Os -static -o tests/mini_socks5_daemon_android \
            tests/mini_socks5_daemon.c
          $CC -std=c23 -Os -Isrc -Ilib -DNDEBUG -DCIPHER_HARDEN -static \
            -o tests/simplecipher_android \
            src/main.c src/platform.c src/crypto.c src/protocol.c \
            src/ratchet.c src/network.c src/tui.c src/tui_posix.c \
            src/cli.c src/cli_posix.c lib/monocypher.c -lm
      - name: Build release APKs with x86_64 for emulator
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PextraAbi=x86_64
      - name: Emulator smoke test (release full flavor)
        uses: reactivecircus/android-emulator-runner@70f4dee990796918b78d040e3278474bdbd348a7 # v2
        with:
          api-level: 28
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            # Find the release APK (signed)
            APK=$(ls android/app/build/outputs/apk/full/release/app-full-release*.apk 2>/dev/null | head -1)
            if [ -z "$APK" ]; then
              echo "::error::Release APK not found for emulator test"
              exit 1
            fi
            bash tests/test_android_emulator.sh "$APK"

  release:
    needs: [test-p2p, test-linux, test-linux-aarch64, test-windows, test-windows-aarch64, build-android, test-asan-ubsan, static-analysis, fuzz, test-android-emulator, test-freebsd, test-openbsd, test-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write        # Sigstore OIDC token for attestation
      attestations: write    # Store attestations on the repo

    steps:
      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-x86_64
          path: linux-x86_64

      - name: Download Linux aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-linux-aarch64
          path: linux-aarch64

      - name: Download Windows x86_64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-x86_64
          path: win-x86_64

      - name: Download Windows aarch64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-win-aarch64
          path: win-aarch64

      - name: Download Android APKs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: simplecipher-android
          path: android-apks

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp linux-x86_64/simplecipher release/simplecipher-linux-x86_64
          cp linux-aarch64/simplecipher release/simplecipher-linux-aarch64
          cp win-x86_64/simplecipher.exe release/simplecipher-win-x86_64.exe
          cp win-aarch64/simplecipher.exe release/simplecipher-win-aarch64.exe
          cp android-apks/simplecipher-minimal.apk release/simplecipher-minimal.apk
          cp android-apks/simplecipher-full.apk release/simplecipher-full.apk
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Attest build provenance (Sigstore)
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            release/simplecipher-linux-x86_64
            release/simplecipher-linux-aarch64
            release/simplecipher-win-x86_64.exe
            release/simplecipher-win-aarch64.exe
            release/simplecipher-minimal.apk
            release/simplecipher-full.apk

      - name: Sign release artifacts (cosign keyless)
        run: |
          # Install cosign (pinned version + SHA256 verification)
          COSIGN_VERSION=2.4.3
          COSIGN_SHA256="caaad125acef1cb81d58dcdc454a1e429d09a750d1e9e2b3ed1aed8964454708"
          curl -sL "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64" -o /tmp/cosign
          ACTUAL_SHA=$(sha256sum /tmp/cosign | cut -d' ' -f1)
          if [ "$ACTUAL_SHA" != "$COSIGN_SHA256" ]; then
            echo "COSIGN CHECKSUM MISMATCH"
            echo "  expected: $COSIGN_SHA256"
            echo "  got:      $ACTUAL_SHA"
            exit 1
          fi
          install -m 755 /tmp/cosign /usr/local/bin/cosign

          # Sign each artifact — produces .sig detached signatures
          # Keyless: uses GitHub OIDC identity, logged to Sigstore transparency log
          cd release
          for f in simplecipher-linux-x86_64 simplecipher-linux-aarch64 \
                   simplecipher-win-x86_64.exe simplecipher-win-aarch64.exe \
                   simplecipher-minimal.apk simplecipher-full.apk SHA256SUMS.txt; do
            cosign sign-blob --yes "$f" --output-signature "${f}.sig" --output-certificate "${f}.cert"
          done

      - name: Delete existing release (if re-tagging)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --cleanup-tag=false \
            --yes 2>/dev/null || true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release/simplecipher-linux-x86_64 \
            release/simplecipher-linux-aarch64 \
            release/simplecipher-win-x86_64.exe \
            release/simplecipher-win-aarch64.exe \
            release/simplecipher-minimal.apk \
            release/simplecipher-full.apk \
            release/SHA256SUMS.txt \
            release/*.sig \
            release/*.cert \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
