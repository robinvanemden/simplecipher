name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x86_64
        - Linux aarch64
        - Windows x86_64
        - Windows aarch64
        - Android (minimal APK)
        - Android (full APK)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `simplecipher --version`, or APK version from app info"
      placeholder: "v0.5.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. Run `simplecipher listen`
        2. From another terminal, run `simplecipher connect 127.0.0.1`
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output or logs
      description: Paste any error messages or terminal output (no keys or message content)
      render: shell
