plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.simplecipher'
    compileSdk 35
    ndkVersion '28.0.13004108'

    defaultConfig {
        applicationId 'com.example.simplecipher'
        minSdk 28
        targetSdk 35
        versionCode 1
        versionName '1.0'

        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }

        externalNativeBuild {
            cmake {
                arguments '-DANDROID_STL=none'
            }
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            debuggable false
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    lint {
        fatal 'MutableImplicitPendingIntent'
    }

    externalNativeBuild {
        cmake {
            path 'src/main/c/CMakeLists.txt'
        }
    }
}
